name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build

      - name: Package build
        run: |
          mkdir -p deploy

          cp -r .next deploy/
          cp -r public deploy/
          cp package*.json deploy/
          cp ecosystem.config.js deploy/
          cp next.config.* deploy/ 2>/dev/null || true

          tar -czf deploy.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      # 🔥 PRE-CLEAN + BACKUP
      - name: Pre-clean EC2 (with backup)
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app || exit

            echo "🔹 Creating backup..."
            mkdir -p backups
            timestamp=$(date +%Y%m%d_%H%M%S)

            tar -czf backups/backup_${timestamp}.tar.gz \
              .next public package.json ecosystem.config.js 2>/dev/null || true

            ls -t backups/*.tar.gz | tail -n +6 | xargs -r rm

            echo "🔹 Cleaning old build..."
            rm -rf .next node_modules
            rm -f deploy.tar.gz

            npm cache clean --force || true
          EOF

          rm key.pem

      # 🚀 DEPLOY
      - name: Deploy to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          scp -i key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz $USER@$HOST:/var/www/next-app/

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app || exit

            echo "🔹 Extract new build..."
            rm -rf .next   # 🔥 FORCE REMOVE AGAIN (important)
            tar --overwrite -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "🔹 Install dependencies..."
            npm install --omit=dev

            echo "🔹 Fix permissions..."
            sudo chown -R $USER:$USER /var/www/next-app

            echo "🔹 Verify build..."
            ls -la .next
            cat .next/BUILD_ID || echo "❌ BUILD_ID missing"

            echo "🔹 Restart PM2 (force refresh)..."
            pm2 delete next-app || true
            pm2 start ecosystem.config.js
            pm2 save

            echo "🔹 Restart Nginx..."
            sudo systemctl restart nginx || true

            echo "✅ Deployment done"
          EOF

          rm key.pem

      # 🔍 VERIFY
      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "⏳ Waiting for app..."
          sleep 10

          for i in {1..3}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://$HOST || echo "000")

            echo "Attempt $i → Status: $status"

            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "✅ App is live!"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Deployment failed"
          exit 1