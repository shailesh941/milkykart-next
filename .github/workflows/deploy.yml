name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js
        run: npm run build

      # 🔍 Debug (VERY IMPORTANT)
      - name: Show BUILD_ID
        run: cat .next/BUILD_ID

      - name: Package build
        run: |
          mkdir deploy

          cp -r .next deploy/
          cp -r public deploy/
          cp package*.json deploy/
          cp ecosystem.config.js deploy/

          tar -czf deploy.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: deploy.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      # 🔥 CLEAN + BACKUP (SAFE)
      - name: Pre-clean EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app || exit

            echo "🔹 Backup current build..."
            mkdir -p backups
            ts=$(date +%Y%m%d_%H%M%S)

            tar -czf backups/backup_$ts.tar.gz .next 2>/dev/null || true

            echo "🔹 Clean old build..."
            rm -rf .next
            rm -f deploy.tar.gz

            echo "🔹 Free space..."
            npm cache clean --force || true
          EOF

          rm key.pem

      # 🚀 DEPLOY
      - name: Deploy
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          scp -i key.pem -o StrictHostKeyChecking=no deploy.tar.gz $USER@$HOST:/var/www/next-app/

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app || exit

            echo "📦 Extract build..."
            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            echo "📦 Install runtime deps..."
            npm install --omit=dev

            echo "🔁 Restart app (FORCE)..."
            pm2 delete next-app || true
            pm2 start ecosystem.config.js
            pm2 save

            echo "🔁 Restart nginx..."
            sudo systemctl restart nginx || true

            echo "🔍 Check BUILD_ID:"
            cat .next/BUILD_ID
          EOF

          rm key.pem

      # 🔍 VERIFY LIVE
      - name: Verify
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "⏳ Waiting..."
          sleep 10

          curl -I http://$HOST