name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: "npm"

      - run: npm ci
      - run: npm run build

      - name: Package build
        run: |
          mkdir -p deploy
          cp -r .next deploy/
          cp -r public deploy/
          cp package*.json deploy/
          cp ecosystem.config.js deploy/
          tar -czf deploy.tar.gz -C deploy .

      - uses: actions/upload-artifact@v4
        with:
          name: build
          path: deploy.tar.gz

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/download-artifact@v4
        with:
          name: build

      # ✅ CLEAN FIRST (important)
      - name: Pre-clean EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app

            rm -rf .next
            rm -f deploy.tar.gz
            sudo rm -rf /tmp/*
            sudo rm -rf /var/log/*
          EOF

      # 🚀 DEPLOY
      - name: Deploy
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          scp -i key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz $USER@$HOST:/var/www/next-app/

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app

            tar -xzf deploy.tar.gz
            rm deploy.tar.gz

            # install runtime deps only
            npm install --omit=dev

            # fix permissions
            sudo chown -R $USER:$USER /var/www/next-app

            # start app
            if pm2 describe next-app > /dev/null 2>&1; then
              pm2 reload ecosystem.config.js
            else
              pm2 start ecosystem.config.js
            fi

            pm2 save
          EOF

      - name: Verify
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          sleep 10
          curl -I http://$HOST