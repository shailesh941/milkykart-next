name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build:
    name: Build Application
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js 24
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Build Next.js app
        run: npm run build

      - name: Create deployment package
        run: |
          mkdir -p deploy

          # Next.js build output
          cp -r .next deploy/
          cp -r public deploy/

          # configs
          cp package*.json deploy/
          cp ecosystem.config.js deploy/
          cp next.config.* deploy/ 2>/dev/null || true

          tar -czf deploy.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: deployment-package
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    name: Deploy to EC2
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: deployment-package

      - name: Deploy via SSH
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USERNAME: ${{ secrets.EC2_USERNAME }}
          SSH_PRIVATE_KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$SSH_PRIVATE_KEY" > key.pem
          chmod 600 key.pem

          # Upload directly to project folder (NOT /tmp)
          scp -i key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz ${EC2_USERNAME}@${EC2_HOST}:/var/www/milkykart-next/

          ssh -i key.pem -o StrictHostKeyChecking=no \
            ${EC2_USERNAME}@${EC2_HOST} << 'EOF'

            cd /var/www/milkykart-next

            echo "🔹 Freeing space..."
            rm -rf .next node_modules
            rm -f deploy.tar.gz
            sudo rm -rf /tmp/*
            sudo rm -rf /var/log/*

            echo "🔹 Extract new build..."
            tar -xzf deploy.tar.gz -C .
            rm deploy.tar.gz

            echo "🔹 Install dependencies (with dev for Tailwind)..."
            npm ci

            echo "🔹 Restart PM2..."
            pm2 delete milkykart-next || true
            pm2 start ecosystem.config.js
            pm2 save

          EOF

          rm key.pem

      - name: Verify deployment
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "Waiting for app..."
          sleep 10
          curl -I http://${EC2_HOST}