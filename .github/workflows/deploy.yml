name: Deploy to EC2

on:
  push:
    branches: [master]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24.15.0
          cache: "npm"

      - name: Install deps
        run: npm ci

      - name: Build Next.js
        run: npm run build

      # 🔍 DEBUG BUILD ID
      - name: Show BUILD_ID
        run: cat .next/BUILD_ID

      - name: Package build
        run: |
          mkdir -p deploy

          cp -r .next deploy/
          cp -r public deploy/
          cp package*.json deploy/
          cp ecosystem.config.js deploy/
          cp next.config.* deploy/ 2>/dev/null || true

          tar -czf deploy.tar.gz -C deploy .

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: build
          path: deploy.tar.gz
          retention-days: 1

  deploy:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: build

      # 🔥 PRE-CLEAN + BACKUP
      - name: Pre-clean EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app || exit

            echo "🔹 Creating backup..."
            mkdir -p backups
            ts=$(date +%Y%m%d_%H%M%S)

            tar -czf backups/backup_$ts.tar.gz .next 2>/dev/null || true

            # keep last 5 backups
            ls -t backups/*.tar.gz 2>/dev/null | tail -n +6 | xargs -r rm

            echo "🔹 Cleaning old build..."
            rm -rf .next
            rm -f deploy.tar.gz

            echo "🔹 Cleaning npm cache..."
            npm cache clean --force || true
          EOF

          rm key.pem

      # 🚀 DEPLOY
      - name: Deploy to EC2
        env:
          HOST: ${{ secrets.EC2_HOST }}
          USER: ${{ secrets.EC2_USERNAME }}
          KEY: ${{ secrets.EC2_SSH_KEY }}
        run: |
          echo "$KEY" > key.pem
          chmod 600 key.pem

          echo "📤 Uploading build..."
          scp -i key.pem -o StrictHostKeyChecking=no \
            deploy.tar.gz $USER@$HOST:/var/www/next-app/

          ssh -i key.pem -o StrictHostKeyChecking=no $USER@$HOST << 'EOF'
            cd /var/www/next-app || exit

            echo "📦 Checking uploaded file..."
            ls -lh deploy.tar.gz || exit 1

            echo "📦 Validating archive..."
            tar -tzf deploy.tar.gz | head || exit 1

            echo "🔥 Removing old build..."
            rm -rf .next

            echo "📦 Extracting new build..."
            tar -xzf deploy.tar.gz || exit 1
            rm deploy.tar.gz

            echo "🔍 Verifying build..."
            ls -la .next || exit 1
            cat .next/BUILD_ID || exit 1

            echo "📦 Installing dependencies..."
            npm install --omit=dev || exit 1

            echo "🔧 Fixing permissions..."
            sudo chown -R $USER:$USER /var/www/next-app

            echo "🔁 Restarting PM2..."
            pm2 delete next-app || true
            pm2 start ecosystem.config.js --name next-app
            pm2 save

            echo "🔁 Restarting Nginx..."
            sudo systemctl restart nginx || true

            echo "✅ Deployment completed successfully"
          EOF

          rm key.pem

      # 🔍 VERIFY
      - name: Verify deployment
        env:
          HOST: ${{ secrets.EC2_HOST }}
        run: |
          echo "⏳ Waiting for app..."
          sleep 10

          for i in {1..3}; do
            status=$(curl -s -o /dev/null -w "%{http_code}" http://$HOST || echo "000")

            echo "Attempt $i → Status: $status"

            if [ "$status" = "200" ] || [ "$status" = "301" ] || [ "$status" = "302" ]; then
              echo "✅ App is live!"
              exit 0
            fi

            sleep 5
          done

          echo "❌ Deployment failed"
          exit 1